name: Feature request
description: Suggest a new feature or enhancement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please confirm the feature is in scope. This package is a thin Moonshot AI provider for the Laravel AI SDK — embeddings, image generation, audio, transcription, and Moonshot provider tools are explicitly out of scope (see README "Not supported").
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do? What is missing or hard to do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should this work? Sketch the API or config shape if possible.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you try or rule out?
    validations:
      required: false
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This feature is supported by the Moonshot API.
          required: true
        - label: This feature is not in the README "Not supported" list.
          required: true
